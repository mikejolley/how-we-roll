name: Supabase keepalive

# Free-tier Supabase projects pause after 7 days without API activity.
# This pings the REST API twice a week so the project stays active.
# All inputs come from repo secrets via env: — no untrusted github.event.* usage.

on:
  schedule:
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_KEY}" ]; then
            echo "::error::VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY must be set as repository Actions secrets."
            exit 1
          fi
          curl -fsS \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            "${SUPABASE_URL}/rest/v1/rooms?select=id&limit=1" \
            -o /dev/null
          echo "Supabase keepalive ping succeeded."
